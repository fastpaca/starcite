name: Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: starcite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d starcite_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      MIX_ENV: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: '1.18.4'
        otp-version: '28.0'

    - name: Restore dependencies cache
      uses: actions/cache@v4
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-

    - name: Install dependencies
      run: mix deps.get

    - name: Wait for Postgres
      run: |
        ready=false
        for _ in $(seq 1 30); do
          if pg_isready -h localhost -p 5432 -U postgres -d starcite_test >/dev/null; then
            ready=true
            break
          fi
          sleep 1
        done
        if [ "$ready" != "true" ]; then
          docker ps
          echo "Postgres did not become healthy in time" >&2
          exit 1
        fi
      env:
        PGPASSWORD: postgres

    - name: Setup test database
      run: mix starcite.test_setup

    - name: Run tests
      run: mix test --trace

